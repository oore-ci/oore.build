<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta
      name="viewport"
      content="width=device-width, initial-scale=1.0, viewport-fit=cover"
    />
    <link rel="icon" type="image/svg+xml" href="/logo.svg" />
    <link rel="alternate icon" href="/favicon.ico" />
    <meta
      name="theme-color"
      content="#ffffff"
      media="(prefers-color-scheme: light)"
      data-theme="light"
    />
    <meta
      name="theme-color"
      content="#171717"
      media="(prefers-color-scheme: dark)"
      data-theme="dark"
    />
    <meta
      name="description"
      content="Self-hosted, Flutter-first mobile CI and internal app distribution platform"
    />
    <meta name="author" content="Aryakumar Jha" />
    <meta property="og:title" content="Oore CI | Self-Hosted Mobile CI" />
    <meta property="og:site_name" content="Oore CI" />
    <meta
      property="og:description"
      content="Self-hosted, Flutter-first mobile CI and internal app distribution platform"
    />
    <meta property="og:type" content="website" />
    <meta property="og:image" content="https://ci.oore.build/og-image.png" />
    <meta property="og:image:type" content="image/png" />
    <meta property="og:image:width" content="1200" />
    <meta property="og:image:height" content="630" />
    <meta property="og:logo" content="https://ci.oore.build/logo.svg" />
    <meta name="twitter:card" content="summary_large_image" />
    <meta name="twitter:title" content="Oore CI | Self-Hosted Mobile CI" />
    <meta
      name="twitter:description"
      content="Self-hosted, Flutter-first mobile CI and internal app distribution platform"
    />
    <meta name="twitter:image" content="https://ci.oore.build/og-image.png" />
    <meta property="og:url" content="https://ci.oore.build/" />
    <link rel="canonical" href="https://ci.oore.build/" />
    <link rel="apple-touch-icon" href="/logo192.png" />
    <link rel="manifest" href="/manifest.json" />
    <title>Oore CI | Self-Hosted Mobile CI</title>
    <script>
      try {
        const savedTheme = localStorage.getItem('theme')
        const dark =
          savedTheme === 'dark' ||
          (savedTheme !== 'light' &&
            window.matchMedia('(prefers-color-scheme: dark)').matches)
        document.documentElement.classList.add(dark ? 'dark' : 'light')
        document.documentElement.style.colorScheme = dark ? 'dark' : 'light'
        document.querySelector('[data-theme="light"]').media = dark
          ? 'not all'
          : 'all'
        document.querySelector('[data-theme="dark"]').media = dark
          ? 'all'
          : 'not all'
      } catch {
        // The system color-scheme media query below remains the fallback.
      }
    </script>
    <script type="application/ld+json">
      {
        "@context": "https://schema.org",
        "@type": "SoftwareApplication",
        "name": "Oore CI",
        "url": "https://oore.build",
        "applicationCategory": "DeveloperApplication",
        "operatingSystem": "macOS",
        "description": "Self-hosted, Flutter-first mobile CI and internal app distribution platform",
        "offers": {
          "@type": "Offer",
          "price": "0",
          "priceCurrency": "USD"
        },
        "author": {
          "@type": "Person",
          "name": "Aryakumar Jha",
          "url": "https://aryak.dev",
          "sameAs": "https://github.com/devaryakjha"
        }
      }
    </script>
    <!-- Inline critical styles for instant first paint before CSS loads -->
    <style>
      html {
        --initial-background: #ffffff;
        background: var(--initial-background);
        color-scheme: light;
      }
      html.dark {
        --initial-background: #171717;
        color-scheme: dark;
      }
      html,
      body,
      #app {
        min-height: 100%;
        min-height: 100svh;
        background: var(--initial-background);
      }
      body {
        margin: 0;
      }
      @media (prefers-color-scheme: dark) {
        html:not(.light) {
          --initial-background: #171717;
          color-scheme: dark;
        }
      }
      .app-loading {
        display: flex;
        align-items: center;
        justify-content: center;
        min-height: 100svh;
        min-height: 100dvh;
        opacity: 1;
        transition: opacity 0.15s;
      }
      .app-loading svg {
        width: 32px;
        height: 32px;
        animation: pulse 1.6s ease-in-out infinite;
      }
      @keyframes pulse {
        0%,
        100% {
          opacity: 0.4;
        }
        50% {
          opacity: 1;
        }
      }
    </style>
  </head>
  <body>
    <div id="app">
      <!-- Shown instantly; removed when React mounts -->
      <div class="app-loading" aria-hidden="true">
        <svg
          viewBox="0 0 100 100"
          fill="none"
          xmlns="http://www.w3.org/2000/svg"
        >
          <rect width="100" height="100" rx="20" fill="#dc7702" />
          <text
            x="50"
            y="62"
            text-anchor="middle"
            font-size="48"
            font-weight="700"
            fill="#fff"
            font-family="system-ui"
          >
            o
          </text>
        </svg>
      </div>
    </div>
    <script type="module" src="/src/main.tsx"></script>
  </body>
</html>
