<svg
  xmlns="http://www.w3.org/2000/svg"
  viewBox="100 100 320 320"
  role="img"
  aria-labelledby="title description"
>
  <title id="title">Oore</title>
  <desc id="description">
    A circular build sweep connecting a source commit to an artifact.
  </desc>
  <defs>
    <mask
      id="cutouts"
      x="0"
      y="0"
      width="512"
      height="512"
      maskUnits="userSpaceOnUse"
    >
      <rect width="512" height="512" fill="white" />
      <circle cx="173" cy="349" r="16" fill="black" />
      <rect x="329" y="197" width="66" height="11" fill="black" />
    </mask>
  </defs>
  <g fill="#bb4d00" mask="url(#cutouts)">
    <circle
      cx="254"
      cy="260"
      r="119"
      fill="none"
      stroke="#bb4d00"
      stroke-width="22"
    />
    <circle cx="173" cy="349" r="35" />
    <rect x="315" y="170" width="79" height="90" rx="15" />
  </g>
</svg>
