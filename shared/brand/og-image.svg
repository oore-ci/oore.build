<svg xmlns="http://www.w3.org/2000/svg" width="1200" height="630" viewBox="0 0 1200 630">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#0a0a0a"/>
      <stop offset="100%" style="stop-color:#1a1a1a"/>
    </linearGradient>
  </defs>
  <rect width="1200" height="630" fill="url(#bg)"/>
  <!-- Logo: embedded actual logo.svg via nested <svg> -->
  <svg x="80" y="195" width="80" height="80" viewBox="0 0 32 32">
    <defs>
      <circle id="cut" cx="16" cy="16" r="7"/>
      <mask id="hole">
        <rect x="0" y="0" width="32" height="32" fill="white"/>
        <use href="#cut" fill="black"/>
      </mask>
      <clipPath id="left">
        <rect x="0" y="0" width="15" height="32"/>
      </clipPath>
      <clipPath id="right">
        <rect x="17" y="0" width="15" height="32"/>
      </clipPath>
    </defs>
    <rect x="2" y="2" width="28" height="28" rx="6" fill="#dc7702" clip-path="url(#left)" mask="url(#hole)"/>
    <rect x="2" y="2" width="28" height="28" rx="6" fill="#dc7702" clip-path="url(#right)" mask="url(#hole)"/>
  </svg>
  <text x="200" y="260" font-size="56" font-weight="700" fill="#ffffff" font-family="system-ui">Oore CI</text>
  <text x="80" y="320" font-size="28" fill="#a3a3a3" font-family="system-ui">Self-hosted, Flutter-first mobile CI</text>
  <text x="80" y="360" font-size="22" fill="#737373" font-family="system-ui">Android  ·  iOS  ·  macOS builds with OIDC security</text>
  <text x="80" y="540" font-size="18" fill="#525252" font-family="system-ui">oore.build</text>
</svg>
