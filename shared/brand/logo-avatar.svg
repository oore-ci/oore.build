<svg
  xmlns="http://www.w3.org/2000/svg"
  viewBox="0 0 512 512"
  role="img"
  aria-labelledby="title description"
>
  <title id="title">Oore app icon</title>
  <desc id="description">
    The Oore source-to-artifact mark on an amber rounded square.
  </desc>
  <defs>
    <mask
      id="cutouts"
      x="0"
      y="0"
      width="512"
      height="512"
      maskUnits="userSpaceOnUse"
    >
      <rect width="512" height="512" fill="white" />
      <circle cx="173" cy="349" r="16" fill="black" />
      <rect x="329" y="197" width="66" height="11" fill="black" />
    </mask>
  </defs>
  <rect x="16" y="16" width="480" height="480" rx="96" fill="#bb4d00" />
  <g transform="translate(-26 -26) scale(1.1)">
    <g fill="#fffbeb" mask="url(#cutouts)">
      <circle
        cx="254"
        cy="260"
        r="119"
        fill="none"
        stroke="#fffbeb"
        stroke-width="22"
      />
      <circle cx="173" cy="349" r="35" />
      <rect x="315" y="170" width="79" height="90" rx="15" />
    </g>
  </g>
</svg>
