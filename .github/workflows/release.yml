name: Release

on:
  push:
    tags: ["v*"]
  workflow_dispatch:
    inputs:
      tag:
        description: Release tag to build and publish
        required: true
        type: string

concurrency:
  group: release-${{ inputs.tag || github.ref_name }}
  cancel-in-progress: false

env:
  RELEASE_TAG: ${{ inputs.tag || github.ref_name }}

jobs:
  deploy:
    name: Deploy Pages
    runs-on: ${{ vars.RUNNER_MACOS || 'macos-latest' }}
    steps:
      - uses: actions/checkout@v6
        with:
          fetch-depth: 0
          ref: ${{ env.RELEASE_TAG }}

      - name: Setup Bun
        uses: oven-sh/setup-bun@v2

      - name: Install dependencies
        run: bun install --frozen-lockfile

      - name: Build and deploy Pages
        env:
          CLOUDFLARE_ACCOUNT_ID: bf288a8d0e450c22157076593bc1f6be
          CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
        run: |
          set -euo pipefail
          tag="${RELEASE_TAG}"

          pages_branch="stable"
          if echo "$tag" | grep -q -- '-alpha\.'; then
            pages_branch="alpha"
          elif echo "$tag" | grep -q -- '-beta\.'; then
            pages_branch="beta"
          fi

          export PAGES_PROJECT_SITE="oore"
          export PAGES_PROJECT_DOCS="oore-docs"
          export PAGES_PROJECT_WEB="oore-ci"
          export PAGES_PROJECT_DEMO="oore-demo"
          export PAGES_BRANCH="$pages_branch"
          PAGES_COMMIT_HASH="$(git rev-list -n 1 "$tag")"
          export PAGES_COMMIT_HASH
          export PAGES_COMMIT_MESSAGE="$tag"
          export WRANGLER="./node_modules/.bin/wrangler"

          make build-web build-site build-docs

          deploy_pages() {
            local target="$1"
            local attempt log_file delay
            log_file="$(mktemp)"
            trap 'rm -f "$log_file"' RETURN

            for attempt in 1 2 3 4; do
              if make "$target" 2>&1 | tee "$log_file"; then
                return 0
              fi

              if ! grep -Eq '(HTTP status|status code:)[[:space:]]*5[0-9]{2}' "$log_file"; then
                echo "${target} failed with a non-transient error; not retrying."
                return 1
              fi

              if [ "$attempt" -eq 4 ]; then
                echo "${target} still failed after ${attempt} attempts."
                return 1
              fi

              delay=$((attempt * 15))
              echo "${target} hit a transient Cloudflare API error; retrying in ${delay}s (${attempt}/4)."
              sleep "$delay"
            done
          }

          # Deploy serially so one release does not burst Cloudflare's Pages API.
          deploy_pages deploy-site-only
          deploy_pages deploy-docs-only
          deploy_pages deploy-web-only

          make build-demo
          deploy_pages deploy-demo-only

  rust:
    name: Build Rust (${{ matrix.arch }})
    runs-on: ${{ vars.RUNNER_MACOS || 'macos-latest' }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - arch: arm64
            target: aarch64-apple-darwin
          - arch: x86_64
            target: x86_64-apple-darwin
    steps:
      - uses: actions/checkout@v6
        with:
          ref: ${{ env.RELEASE_TAG }}

      - name: Setup Rust target
        run: rustup target add "${{ matrix.target }}"

      - uses: Swatinem/rust-cache@v2
        with:
          cache-bin: false
          cache-on-failure: true
          cache-workspace-crates: true
          key: ${{ matrix.target }}

      - name: Build Rust
        run: |
          cargo build --release -p oored -p oore --target "${{ matrix.target }}"
          mkdir -p dist/rust
          cp "target/${{ matrix.target }}/release/oored" dist/rust/oored
          cp "target/${{ matrix.target }}/release/oore" dist/rust/oore

      - uses: actions/upload-artifact@v6
        with:
          name: rust-${{ matrix.arch }}
          path: dist/rust
          if-no-files-found: error

  release:
    name: Build & publish assets
    needs: rust
    runs-on: ${{ vars.RUNNER_MACOS || 'macos-latest' }}
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v6
        with:
          fetch-depth: 0
          ref: ${{ env.RELEASE_TAG }}

      - name: Setup Bun
        uses: oven-sh/setup-bun@v2

      - uses: actions/download-artifact@v6
        with:
          name: rust-arm64
          path: dist/rust/arm64

      - uses: actions/download-artifact@v6
        with:
          name: rust-x86_64
          path: dist/rust/x86_64

      - name: Install dependencies
        run: bun install --frozen-lockfile

      - name: Build web
        run: make build-web

      - name: Compile standalone web server
        run: |
          bun build --compile --target=bun-darwin-arm64 --outfile dist/oore-web-arm64 apps/web/tools/oore-web.js
          bun build --compile --target=bun-darwin-x64 --outfile dist/oore-web-x86_64 apps/web/tools/oore-web.js
          bun build --compile --target=bun-linux-arm64 --outfile dist/oore-web-linux-arm64 apps/web/tools/oore-web.js
          bun build --compile --target=bun-linux-x64 --outfile dist/oore-web-linux-x86_64 apps/web/tools/oore-web.js
          chmod +x dist/oore-web-arm64 dist/oore-web-x86_64 dist/oore-web-linux-arm64 dist/oore-web-linux-x86_64

      - name: Package release tarballs
        run: |
          set -euo pipefail
          tag="${RELEASE_TAG}"
          ver="${tag#v}"
          mkdir -p "dist/releases/$tag"

          stage_arm="dist/stage-arm64"
          stage_x64="dist/stage-x86_64"
          stage_web_darwin_arm="dist/stage-web-darwin-arm64"
          stage_web_darwin_x64="dist/stage-web-darwin-x86_64"
          stage_web_linux_arm="dist/stage-web-linux-arm64"
          stage_web_linux_x64="dist/stage-web-linux-x86_64"
          rm -rf "$stage_arm" "$stage_x64" "$stage_web_darwin_arm" "$stage_web_darwin_x64" "$stage_web_linux_arm" "$stage_web_linux_x64"
          mkdir -p "$stage_arm/bin" "$stage_x64/bin"
          mkdir -p "$stage_web_darwin_arm/bin" "$stage_web_darwin_x64/bin"
          mkdir -p "$stage_web_linux_arm/bin" "$stage_web_linux_x64/bin"

          cp "dist/rust/arm64/oored" "$stage_arm/bin/oored"
          cp "dist/rust/arm64/oore"  "$stage_arm/bin/oore"
          cp "dist/oore-web-arm64" "$stage_arm/bin/oore-web"
          cp -R "apps/web/dist" "$stage_arm/web-dist"
          cp "LICENSE" "$stage_arm/LICENSE"
          printf '%s\n' "$ver" > "$stage_arm/VERSION"

          cp "dist/rust/x86_64/oored" "$stage_x64/bin/oored"
          cp "dist/rust/x86_64/oore"  "$stage_x64/bin/oore"
          cp "dist/oore-web-x86_64" "$stage_x64/bin/oore-web"
          cp -R "apps/web/dist" "$stage_x64/web-dist"
          cp "LICENSE" "$stage_x64/LICENSE"
          printf '%s\n' "$ver" > "$stage_x64/VERSION"

          cp "dist/oore-web-arm64" "$stage_web_darwin_arm/bin/oore-web"
          cp -R "apps/web/dist" "$stage_web_darwin_arm/web-dist"
          cp "LICENSE" "$stage_web_darwin_arm/LICENSE"
          printf '%s\n' "$ver" > "$stage_web_darwin_arm/VERSION"

          cp "dist/oore-web-x86_64" "$stage_web_darwin_x64/bin/oore-web"
          cp -R "apps/web/dist" "$stage_web_darwin_x64/web-dist"
          cp "LICENSE" "$stage_web_darwin_x64/LICENSE"
          printf '%s\n' "$ver" > "$stage_web_darwin_x64/VERSION"

          cp "dist/oore-web-linux-arm64" "$stage_web_linux_arm/bin/oore-web"
          cp -R "apps/web/dist" "$stage_web_linux_arm/web-dist"
          cp "LICENSE" "$stage_web_linux_arm/LICENSE"
          printf '%s\n' "$ver" > "$stage_web_linux_arm/VERSION"

          cp "dist/oore-web-linux-x86_64" "$stage_web_linux_x64/bin/oore-web"
          cp -R "apps/web/dist" "$stage_web_linux_x64/web-dist"
          cp "LICENSE" "$stage_web_linux_x64/LICENSE"
          printf '%s\n' "$ver" > "$stage_web_linux_x64/VERSION"

          out="dist/releases/$tag"
          arm_asset="$(printf 'oore_%s_darwin_arm64.tar.gz' "$ver")"
          x64_asset="$(printf 'oore_%s_darwin_x86_64.tar.gz' "$ver")"
          web_darwin_arm_asset="$(printf 'oore-web_%s_darwin_arm64.tar.gz' "$ver")"
          web_darwin_x64_asset="$(printf 'oore-web_%s_darwin_x86_64.tar.gz' "$ver")"
          web_linux_arm_asset="$(printf 'oore-web_%s_linux_arm64.tar.gz' "$ver")"
          web_linux_x64_asset="$(printf 'oore-web_%s_linux_x86_64.tar.gz' "$ver")"
          checksums="$(printf 'oore_%s_checksums.txt' "$ver")"
          tar -C "$stage_arm" -czf "$out/$arm_asset" .
          tar -C "$stage_x64" -czf "$out/$x64_asset" .
          tar -C "$stage_web_darwin_arm" -czf "$out/$web_darwin_arm_asset" .
          tar -C "$stage_web_darwin_x64" -czf "$out/$web_darwin_x64_asset" .
          tar -C "$stage_web_linux_arm" -czf "$out/$web_linux_arm_asset" .
          tar -C "$stage_web_linux_x64" -czf "$out/$web_linux_x64_asset" .
          (cd "$out" && shasum -a 256 "$arm_asset" "$x64_asset" "$web_darwin_arm_asset" "$web_darwin_x64_asset" "$web_linux_arm_asset" "$web_linux_x64_asset" > "$checksums")

      - name: Generate release notes
        run: |
          set -euo pipefail
          tag="${RELEASE_TAG}"

          channel="prod"
          if echo "$tag" | grep -q -- '-alpha\.'; then
            channel="alpha"
          elif echo "$tag" | grep -q -- '-beta\.'; then
            channel="beta"
          fi

          prev=""
          if [ "$channel" = "alpha" ]; then
            prev="$(git tag -l 'v*-alpha.*' --sort=-v:refname | grep -v -F "$tag" | head -n1 || true)"
          elif [ "$channel" = "beta" ]; then
            prev="$(git tag -l 'v*-beta.*' --sort=-v:refname | grep -v -F "$tag" | head -n1 || true)"
          else
            prev="$(git tag -l 'v*' --sort=-v:refname | grep -v -- '-' | grep -v -F "$tag" | head -n1 || true)"
          fi

          repo="${GITHUB_REPOSITORY}"
          out="dist/releases/$tag/RELEASE_NOTES.md"

          {
            echo "# $tag"
            echo

            if [ -n "$prev" ]; then
              echo "Changes since $prev:"
              echo
              git log --no-merges --pretty=format:'- %s (%h)' "$prev..$tag" | grep -v '^- chore(release): bump version to ' || true
              echo
              echo "**Full Changelog**: https://github.com/$repo/compare/$prev...$tag"
            else
              echo "Changes:"
              echo
              git log --no-merges --pretty=format:'- %s (%h)' "$tag" | grep -v '^- chore(release): bump version to ' || true
              echo
              echo "**Full Changelog**: https://github.com/$repo/releases/tag/$tag"
            fi
            echo
          } > "$out"

      - name: Create GitHub Release
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          GH_REPO: ${{ github.repository }}
        run: |
          set -euo pipefail
          tag="${RELEASE_TAG}"

          prerelease_flag=""
          if echo "$tag" | grep -q -- '-alpha\.'; then
            prerelease_flag="--prerelease"
          elif echo "$tag" | grep -q -- '-beta\.'; then
            prerelease_flag="--prerelease"
          fi

          notes="dist/releases/$tag/RELEASE_NOTES.md"
          dir="dist/releases/$tag"

          # Create or update release
          if gh release view "$tag" >/dev/null 2>&1; then
            # shellcheck disable=SC2086
            gh release edit "$tag" --title "$tag" $prerelease_flag --notes-file "$notes"
          else
            # shellcheck disable=SC2086
            gh release create "$tag" --title "$tag" $prerelease_flag --notes-file "$notes"
          fi

          gh release upload "$tag" "$dir"/*.tar.gz "$dir"/*.txt "$notes" --clobber
