name: Validate

on:
  pull_request:
  push:
    branches: [master, stable, alpha, beta]

concurrency:
  group: validate-${{ github.ref }}
  cancel-in-progress: true

jobs:
  frontend-docs:
    name: Frontend & Docs
    runs-on: [self-hosted, jarvis]
    steps:
      - uses: actions/checkout@v6

      - name: Install dependencies
        run: bun install --frozen-lockfile

      - name: Docs check
        run: make docs-check

      - name: Lint
        run: make lint-web lint-docs

      - name: Test
        run: make test-web test-docs

      - name: Build
        run: make build-web build-docs build-site

  rust:
    name: Rust
    runs-on: [self-hosted, jarvis]
    steps:
      - uses: actions/checkout@v6

      - name: Format check
        run: cargo fmt --check

      - name: Test
        run: cargo test --workspace

      - name: Clippy
        run: cargo clippy --workspace --all-targets --all-features -- -D warnings

      - name: Check
        run: cargo check --workspace
