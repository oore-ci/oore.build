name: Validate

on:
  pull_request:
    branches: [master, alpha, beta, stable]
  push:
    branches: [master, alpha, beta, stable]
  workflow_dispatch:

concurrency:
  group: validate-${{ github.ref }}
  cancel-in-progress: true

jobs:
  changes:
    name: Detect changes
    runs-on: ${{ vars.RUNNER_LINUX || 'ubuntu-latest' }}
    outputs:
      frontend: ${{ steps.filter.outputs.frontend }}
      docs: ${{ steps.filter.outputs.docs }}
      rust: ${{ steps.filter.outputs.rust }}
    steps:
      - uses: actions/checkout@v6
      - uses: dorny/paths-filter@v4
        id: filter
        with:
          # Long-lived release branches must compare with their own previous
          # commit, not the repository default branch.
          base: ${{ github.ref }}
          filters: |
            frontend:
              - 'apps/web/**'
              - 'bun.lock'
              - 'package.json'
              - 'Makefile'
              - '.github/workflows/validate.yml'
            docs:
              - 'apps/docs-site/**'
              - 'docs/**'
              - 'scripts/**'
              - 'tools/release-smoke.sh'
              - 'tools/autotag.sh'
              - '.github/workflows/**'
            rust:
              - 'crates/**'
              - 'Cargo.toml'
              - 'Cargo.lock'
              - 'tools/release-smoke.sh'
              - 'tools/autotag.sh'
              - '.github/workflows/**'

  frontend:
    name: Frontend
    needs: changes
    if: needs.changes.outputs.frontend == 'true'
    runs-on: ${{ vars.RUNNER_LINUX || 'ubuntu-latest' }}
    steps:
      - uses: actions/checkout@v6

      - name: Setup Bun
        uses: oven-sh/setup-bun@v2

      - name: Install dependencies
        run: bun install --frozen-lockfile

      - name: Lint
        run: make lint-web

      - name: Test
        run: make test-web

      - name: Install Playwright browsers
        run: cd apps/web && bunx playwright install --with-deps chromium firefox webkit

      - name: Browser test
        run: make test-web-ui

      - name: Upload browser audit screenshots
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: frontend-browser-audit
          path: apps/web/dist/playwright-results/**/*.png
          if-no-files-found: ignore
          retention-days: 7

      - name: Build
        run: make build-web

      - name: Validate standalone Linux web server
        run: |
          set -euo pipefail
          launcher=dist/oore-web-native
          bun build --compile --outfile "$launcher" apps/web/tools/oore-web.js
          chmod +x "$launcher"

          "$launcher" validate-config \
            --listen 100.64.10.30:4174 \
            --backend-url http://100.64.10.20:8787 \
            --browser-transport-protected \
            --backend-transport-protected \
            --dist-dir apps/web/dist

          if "$launcher" validate-config \
            --listen 100.64.10.30:4174 \
            --backend-url http://100.64.10.20:8787 \
            --browser-transport-protected \
            --dist-dir apps/web/dist; then
            echo 'Standalone launcher accepted an unprotected remote HTTP backend.' >&2
            exit 1
          fi

          if "$launcher" validate-config \
            --listen 100.64.10.30:4174 \
            --backend-url http://100.64.10.20:8787 \
            --backend-transport-protected \
            --dist-dir apps/web/dist; then
            echo 'Standalone launcher accepted an unprotected non-loopback listener.' >&2
            exit 1
          fi

  docs:
    name: Docs
    needs: changes
    if: needs.changes.outputs.docs == 'true'
    runs-on: ${{ vars.RUNNER_LINUX || 'ubuntu-latest' }}
    steps:
      - uses: actions/checkout@v6

      - name: Setup Bun
        uses: oven-sh/setup-bun@v2

      - name: Install dependencies
        run: bun install --frozen-lockfile

      - name: Lint
        run: make lint-docs

      - name: Test
        run: make test-docs

      - name: Build
        run: make build-docs build-site

  rust:
    name: Rust
    needs: changes
    if: needs.changes.outputs.rust == 'true'
    runs-on: ${{ vars.RUNNER_MACOS || 'macos-latest' }}
    steps:
      - uses: actions/checkout@v6

      - uses: Swatinem/rust-cache@v2
        with:
          cache-bin: false
          cache-on-failure: true

      - name: Format check
        run: cargo fmt --check

      - name: Test
        run: cargo test --workspace

      - name: Clippy
        run: cargo clippy --workspace --all-targets --all-features -- -D warnings

      - name: Check
        run: cargo check --workspace
