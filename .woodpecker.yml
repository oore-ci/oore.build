            in_section && /^\\[/ { in_section=0 }
          ' Cargo.toml
        )"
        if [ -z "$cargo_ver" ]; then
          echo "Failed to read workspace.package.version from Cargo.toml" >&2
          exit 1
        fi

        latest_prod_tag="$(git tag -l 'v[0-9]*.[0-9]*.[0-9]*' --sort=-v:refname | grep -v -- '-' | head -n1 || true)"
        latest_prod_ver="$(echo "$latest_prod_tag" | sed 's/^v//')"
        if [ -z "$latest_prod_tag" ]; then
          latest_prod_ver="0.0.0"
        fi

        semver_gt() {
          # return 0 if $1 > $2, else 1
          local v1="$1"
          local v2="$2"
          [ -n "$v1" ] || v1="0.0.0"
          [ -n "$v2" ] || v2="0.0.0"

          local a b c x y z
          IFS=. read -r a b c <<<"$v1"
          IFS=. read -r x y z <<<"$v2"

          [ -n "$a" ] || a=0
          [ -n "$b" ] || b=0
          [ -n "$c" ] || c=0
          [ -n "$x" ] || x=0
          [ -n "$y" ] || y=0
          [ -n "$z" ] || z=0
          if (( a > x )); then return 0; fi
          if (( a < x )); then return 1; fi
          if (( b > y )); then return 0; fi
          if (( b < y )); then return 1; fi
          if (( c > z )); then return 0; fi
          return 1
        }

        bump_patch() {
          local v="$1"
          [ -n "$v" ] || v="0.0.0"

          local a b c
          IFS=. read -r a b c <<<"$v"
          [ -n "$a" ] || a=0
          [ -n "$b" ] || b=0
          [ -n "$c" ] || c=0
          printf '%s.%s.%s\n' "$a" "$b" "$((c+1))"
        }

        base="$latest_prod_ver"
        if semver_gt "$cargo_ver" "$latest_prod_ver"; then
          base="$cargo_ver"
        else
          base="$(bump_patch "$latest_prod_ver")"
        fi

        prev="$(git tag -l "v$base-alpha.*" --sort=-v:refname | head -n1 || true)"
        if [ -n "$prev" ]; then
          n="$(echo "$prev" | awk -F. '{print $NF}')"
          case "$n" in
            ''|*[!0-9]*) n=0 ;;
          esac
          next_n="$((n+1))"
        else
          next_n="1"
        fi
        tag="$(printf 'v%s-alpha.%s' "$base" "$next_n")"
        echo "Alpha tag: $tag"

        git tag -a "$tag" -m "Alpha $tag"
        git push origin "$tag"

