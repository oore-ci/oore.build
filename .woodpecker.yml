      - msg="$(git log -1 --pretty=%B)"
      - |
        if echo "$msg" | grep -q "\\[CI SKIP\\]"; then
          echo "Skipping (already CI-generated commit)."
          exit 0
        fi
      - |
        cargo_ver="$(
          awk -F'\"' '
            /^\\[workspace\\.package\\]/ { in_section=1; next }
            in_section && /^[[:space:]]*version[[:space:]]*=/ { print $2; exit }
            in_section && /^\\[/ { in_section=0 }
          ' Cargo.toml
        )"
        if [ -z "$cargo_ver" ]; then
          echo "Failed to read workspace.package.version from Cargo.toml" >&2
          exit 1
        fi

        latest_prod_tag="$(git tag -l 'v[0-9]*.[0-9]*.[0-9]*' --sort=-v:refname | grep -v -- '-' | head -n1 || true)"
        latest_prod_ver="${latest_prod_tag#v}"
        if [ -z "$latest_prod_tag" ]; then
          latest_prod_ver="0.0.0"
        fi

        base="$(python3 - "$cargo_ver" "$latest_prod_ver" <<'PY'\nimport sys\n\ndef parse(v: str):\n  parts=v.split('.')\n  if len(parts)!=3:\n    raise SystemExit(f'invalid semver: {v}')\n  return tuple(int(x) for x in parts)\n\ndef bump_patch(v: str):\n  a,b,c=parse(v)\n  return f\"{a}.{b}.{c+1}\"\n\ncargo=sys.argv[1]\nprod=sys.argv[2]\nif parse(cargo) > parse(prod):\n  print(cargo)\nelse:\n  print(bump_patch(prod))\nPY\n)"

        prev="$(git tag -l \"v${base}-beta.*\" --sort=-v:refname | head -n1 || true)"
        if [ -n "$prev" ]; then
          n="${prev##*.}"
          next_n="$((n+1))"
        else
          next_n="1"
        fi
        tag="v${base}-beta.${next_n}"
        echo "Beta tag: ${tag}"

        if [ "$cargo_ver" != "$base" ]; then
          python3 - "$base" <<'PY'\nimport sys\nfrom pathlib import Path\nnew_version=sys.argv[1]\np=Path('Cargo.toml')\nlines=p.read_text().splitlines(True)\nout=[]\nin_ws=False\nupdated=False\nfor line in lines:\n  if line.strip() == '[workspace.package]':\n    in_ws=True\n    out.append(line)\n    continue\n  if in_ws and line.startswith('[') and not line.strip().startswith('[workspace.package]'):\n    in_ws=False\n  if in_ws and line.lstrip().startswith('version') and '=' in line and not updated:\n    prefix=line.split('=',1)[0]\n    out.append(f\"{prefix}= \\\"{new_version}\\\"\\n\")\n    updated=True\n    continue\n  out.append(line)\nif not updated:\n  raise SystemExit('Failed to update workspace.package.version in Cargo.toml')\np.write_text(''.join(out))\nPY\n"
          git add Cargo.toml
          git -c user.name="oore.build CI" -c user.email="ci@oore.build" commit -m "chore(release): set prerelease base version to ${base} [CI SKIP]"
        fi

        git tag -a "$tag" -m "Beta $tag"
        branch="$(git rev-parse --abbrev-ref HEAD)"
        git push origin "$branch"
        git push origin "$tag"

  # ----- Release: Tag -> Pages Deploy + GitHub Release -----
  - name: release-checkout
    image: bash
    when:
      event:
        - tag
    environment:
      GITHUB_TOKEN:
        from_secret: GITHUB_TOKEN
    commands:
      - set -euo pipefail
      - rm -rf .git
      - git init
      - |
        clone_url="${CI_REPO_CLONE_URL:-https://github.com/${CI_REPO}.git}"
        git remote add origin "$clone_url"
        if [ -n "${GITHUB_TOKEN:-}" ]; then
          # Avoid embedding tokens in the remote URL.
          git config url."https://x-access-token:${GITHUB_TOKEN}@github.com/".insteadOf "https://github.com/"
        fi
      - git fetch --depth=200 origin "+refs/tags/*:refs/tags/*" "+refs/heads/*:refs/remotes/origin/*"
      - git checkout -f "${CI_COMMIT_TAG}"

  - name: release-build-assets
    image: bash
    when:
      event:
        - tag
    environment:
      HOME: /Users/arya
      CARGO_HOME: /Users/arya/.cargo
      RUSTUP_HOME: /Users/arya/.rustup
      PATH: /Users/arya/opt/bin:/Users/arya/.cargo/bin:/Users/arya/.bun/bin:/usr/bin:/bin:/usr/sbin:/sbin
    commands:
      - set -euo pipefail
      - test -n "${CI_COMMIT_TAG:-}"
      - ver="${CI_COMMIT_TAG#v}"
      - mkdir -p "dist/releases/${CI_COMMIT_TAG}"
      - bun install --frozen-lockfile
      - bun run build:web
      - rustup target add aarch64-apple-darwin x86_64-apple-darwin
      - cargo build --release -p oored -p oore --target aarch64-apple-darwin
      - cargo build --release -p oored -p oore --target x86_64-apple-darwin
      - bun build --compile --target=bun-darwin-arm64 --outfile "dist/oore-web-arm64" "apps/web/tools/oore-web.js"
      - bun build --compile --target=bun-darwin-x64 --outfile "dist/oore-web-x86_64" "apps/web/tools/oore-web.js"
      - chmod +x dist/oore-web-arm64 dist/oore-web-x86_64
      - |
        stage_arm="dist/stage-arm64"
        stage_x64="dist/stage-x86_64"
        rm -rf "$stage_arm" "$stage_x64"
        mkdir -p "$stage_arm/bin" "$stage_x64/bin"

        cp "target/aarch64-apple-darwin/release/oored" "$stage_arm/bin/oored"
        cp "target/aarch64-apple-darwin/release/oore"  "$stage_arm/bin/oore"
        cp "dist/oore-web-arm64" "$stage_arm/bin/oore-web"
        cp -R "apps/web/dist" "$stage_arm/web-dist"
        cp "LICENSE" "$stage_arm/LICENSE"
        printf '%s\n' "$ver" > "$stage_arm/VERSION"

        cp "target/x86_64-apple-darwin/release/oored" "$stage_x64/bin/oored"
        cp "target/x86_64-apple-darwin/release/oore"  "$stage_x64/bin/oore"
        cp "dist/oore-web-x86_64" "$stage_x64/bin/oore-web"
        cp -R "apps/web/dist" "$stage_x64/web-dist"
        cp "LICENSE" "$stage_x64/LICENSE"
        printf '%s\n' "$ver" > "$stage_x64/VERSION"

        out="dist/releases/${CI_COMMIT_TAG}"
        arm_asset="oore_${ver}_darwin_arm64.tar.gz"
        x64_asset="oore_${ver}_darwin_x86_64.tar.gz"
        tar -C "$stage_arm" -czf "$out/$arm_asset" .
        tar -C "$stage_x64" -czf "$out/$x64_asset" .
        (cd "$out" && shasum -a 256 "$arm_asset" "$x64_asset" > "oore_${ver}_checksums.txt")

  - name: release-deploy-pages
    image: bash
    when:
      event:
        - tag
    environment:
      HOME: /Users/arya
      CARGO_HOME: /Users/arya/.cargo
      RUSTUP_HOME: /Users/arya/.rustup
      PATH: /Users/arya/opt/bin:/Users/arya/.cargo/bin:/Users/arya/.bun/bin:/usr/bin:/bin:/usr/sbin:/sbin
      CLOUDFLARE_API_TOKEN:
        from_secret: CLOUDFLARE_API_TOKEN
    commands:
      - set -euo pipefail
      - |
        tag="${CI_COMMIT_TAG}"
        channel="prod"
        suffix=""
        if echo "$tag" | grep -q -- '-alpha\\.'; then
          channel="alpha"
          suffix="-alpha"
        elif echo "$tag" | grep -q -- '-beta\\.'; then
          channel="beta"
          suffix="-beta"
        fi

        export PAGES_PROJECT_SITE="oore${suffix}"
        export PAGES_PROJECT_DOCS="oore-docs${suffix}"
        export PAGES_PROJECT_WEB="oore-ci${suffix}"
        export PAGES_PROJECT_DEMO="oore-demo${suffix}"

        echo "Deploy channel=${channel} site=${PAGES_PROJECT_SITE} docs=${PAGES_PROJECT_DOCS} web=${PAGES_PROJECT_WEB}"
      - bun install --frozen-lockfile
      - make build-site build-docs build-web
      - make deploy-site deploy-docs deploy-web

  - name: release-generate-notes
    image: bash
    when:
      event:
        - tag
    commands:
      - set -euo pipefail
      - tag="${CI_COMMIT_TAG}"
      - |
        channel="prod"
        if echo "$tag" | grep -q -- '-alpha\\.'; then
          channel="alpha"
        elif echo "$tag" | grep -q -- '-beta\\.'; then
          channel="beta"
        fi

        if [ "$channel" = "alpha" ]; then
          prev="$(git tag -l 'v*-alpha.*' --sort=-v:refname | grep -v \"^${tag}$\" | head -n1 || true)"
        elif [ "$channel" = "beta" ]; then
          prev="$(git tag -l 'v*-beta.*' --sort=-v:refname | grep -v \"^${tag}$\" | head -n1 || true)"
        else
          prev="$(git tag -l 'v*' --sort=-v:refname | grep -v -- '-' | grep -v \"^${tag}$\" | head -n1 || true)"
        fi

        printf 'channel=%s\nprev=%s\n' "$channel" "${prev:-}"
      - out="dist/releases/${tag}/RELEASE_NOTES.md"
      - |
        {
          echo "# ${tag}"
          echo
          if [ -n "$prev" ]; then
            echo "Changes since ${prev}:"
            echo
            git log --no-merges --pretty=format:'- %s (%h)' "${prev}..${tag}" | grep -v '^- chore(release): bump version to ' || true
          else
            echo "Changes:"
            echo
            git log --no-merges --pretty=format:'- %s (%h)' "${tag}" | grep -v '^- chore(release): bump version to ' || true
          fi
          echo
        } > "$out"

  - name: release-github
    image: bash
    when:
      event:
        - tag
    environment:
      GITHUB_TOKEN:
        from_secret: GITHUB_TOKEN
    commands:
      - set -euo pipefail
      - export GH_TOKEN="$GITHUB_TOKEN"
      - tag="${CI_COMMIT_TAG}"
      - dir="dist/releases/${tag}"
      - notes="${dir}/RELEASE_NOTES.md"
      - |
        prerelease_flag=""
        if echo "$tag" | grep -q -- '-alpha\\.|-beta\\.'; then
          prerelease_flag="--prerelease"
        fi

        # Install gh (user-local, no brew)
        tmp="$(mktemp -d)"
        curl -fsSL -o "$tmp/gh.tgz" "https://github.com/cli/cli/releases/latest/download/gh_$(uname -s | tr '[:upper:]' '[:lower:]')_arm64.tar.gz"
        tar -xzf "$tmp/gh.tgz" -C "$tmp"
        ghbin="$(find "$tmp" -type f -path '*/bin/gh' | head -n1)"
        "$ghbin" --version

        repo="$(
          git config --get remote.origin.url \
            | sed -n 's#.*github\\.com[:/]\\([^/]*\\/[^.]*\\)\\(\\.git\\)\\{0,1\\}$#\\1#p'
        )"
        if [ -z "$repo" ]; then
          repo="${CI_REPO}"
        fi

        # Create or update release
        if "$ghbin" release view "$tag" --repo "$repo" >/dev/null 2>&1; then
          "$ghbin" release edit "$tag" --repo "$repo" --title "$tag" --notes-file "$notes" $prerelease_flag
        else
          "$ghbin" release create "$tag" --repo "$repo" --title "$tag" --notes-file "$notes" $prerelease_flag
        fi

        "$ghbin" release upload "$tag" "$dir"/*.tar.gz "$dir"/*.txt "$notes" --repo "$repo" --clobber
