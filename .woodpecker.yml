steps:
  - name: validate-pr
    image: bash
    when:
      event:
        - pull_request
    environment:
      HOME: /Users/arya
      CARGO_HOME: /Users/arya/.cargo
      RUSTUP_HOME: /Users/arya/.rustup
      PATH: /Users/arya/opt/bin:/Users/arya/.cargo/bin:/Users/arya/.bun/bin:/usr/bin:/bin:/usr/sbin:/sbin
    commands:
      - set -euo pipefail
      - ulimit -n 8192
      - bun install --frozen-lockfile
      - make validate

  - name: validate-push
    image: bash
    when:
      event:
        - push
      branch:
        - alpha
        - beta
        - stable
        - master
    environment:
      HOME: /Users/arya
      CARGO_HOME: /Users/arya/.cargo
      RUSTUP_HOME: /Users/arya/.rustup
      PATH: /Users/arya/opt/bin:/Users/arya/.cargo/bin:/Users/arya/.bun/bin:/usr/bin:/bin:/usr/sbin:/sbin
    commands:
      - set -euo pipefail
      - ulimit -n 8192
      - bun install --frozen-lockfile
      - make validate

  # ----- Autotag: Production (stable -> vX.Y.Z) -----
  - name: autotag-prod-checkout
    image: bash
    when:
      event:
        - push
      branch:
        - stable
    environment:
      GITHUB_TOKEN:
        from_secret: GITHUB_TOKEN
    commands:
      - set -euo pipefail
      - |
        token="$(printenv GITHUB_TOKEN || true)"
        if [ -n "$token" ]; then
          # Avoid embedding tokens in the remote URL.
          git config url."https://x-access-token:$token@github.com/".insteadOf "https://github.com/"
        fi
      - git fetch origin "+refs/heads/stable:refs/remotes/origin/stable" "+refs/tags/*:refs/tags/*"
      - git checkout -B stable "origin/stable"

  - name: autotag-prod-bump-tag
    image: bash
    when:
      event:
        - push
      branch:
        - stable
    environment:
      GITHUB_TOKEN:
        from_secret: GITHUB_TOKEN
    commands:
      - set -euo pipefail
      - msg="$(git log -1 --pretty=%B)"
      - |
        if echo "$msg" | grep -q "\\[CI SKIP\\]"; then
          echo "Skipping (already CI-generated commit)."
          exit 0
        fi
      - |
        if echo "$msg" | grep -q "^chore(release): bump version to "; then
          echo "Skipping (already a release bump commit)."
          exit 0
        fi
      - |
        semver_gt() {
          # return 0 if $1 > $2, else 1
          local v1="$1"
          local v2="$2"
          [ -n "$v1" ] || v1="0.0.0"
          [ -n "$v2" ] || v2="0.0.0"

          local a b c x y z
          IFS=. read -r a b c <<<"$v1"
          IFS=. read -r x y z <<<"$v2"

          [ -n "$a" ] || a=0
          [ -n "$b" ] || b=0
          [ -n "$c" ] || c=0
          [ -n "$x" ] || x=0
          [ -n "$y" ] || y=0
          [ -n "$z" ] || z=0
          if (( a > x )); then return 0; fi
          if (( a < x )); then return 1; fi
          if (( b > y )); then return 0; fi
          if (( b < y )); then return 1; fi
          if (( c > z )); then return 0; fi
          return 1
        }

        bump_patch() {
          local v="$1"
          [ -n "$v" ] || v="0.0.0"

          local a b c
          IFS=. read -r a b c <<<"$v"
          [ -n "$a" ] || a=0
          [ -n "$b" ] || b=0
          [ -n "$c" ] || c=0
          printf '%s.%s.%s\n' "$a" "$b" "$((c+1))"
        }

        cargo_ver="$(
          awk -F'\"' '
            /^\\[workspace\\.package\\]/ { in_section=1; next }
            in_section && /^[[:space:]]*version[[:space:]]*=/ { print $2; exit }
            in_section && /^\\[/ { in_section=0 }
          ' Cargo.toml
        )"
        if [ -z "$cargo_ver" ]; then
          echo "Failed to read workspace.package.version from Cargo.toml" >&2
          exit 1
        fi

        latest_prod_tag="$(git tag -l 'v[0-9]*.[0-9]*.[0-9]*' --sort=-v:refname | grep -v -- '-' | head -n1 || true)"
        latest_prod_ver="$(echo "$latest_prod_tag" | sed 's/^v//')"
        if [ -z "$latest_prod_tag" ]; then
          latest_prod_ver="0.0.0"
        fi

        base="$latest_prod_ver"
        if semver_gt "$cargo_ver" "$latest_prod_ver"; then
          base="$cargo_ver"
        else
          base="$(bump_patch "$latest_prod_ver")"
        fi

        next="$base"
        while git show-ref --tags --quiet "refs/tags/v$next"; do
          next="$(bump_patch "$next")"
        done
        tag="v$next"

        echo "Prod tag: $tag"
        git tag -a "$tag" -m "Release $tag"
        git push origin "$tag"

  # ----- Autotag: Alpha (alpha -> vX.Y.Z-alpha.N) -----
