steps:
  - name: validate-pr
    image: bash
    when:
      event:
        - pull_request
    environment:
      HOME: /Users/arya
      CARGO_HOME: /Users/arya/.cargo
      RUSTUP_HOME: /Users/arya/.rustup
      PATH: /Users/arya/opt/bin:/Users/arya/.cargo/bin:/Users/arya/.bun/bin:/usr/bin:/bin:/usr/sbin:/sbin
    commands:
      - set -euo pipefail
      - bun install --frozen-lockfile
      - make validate

  - name: validate-push
    image: bash
    when:
      event:
        - push
      branch:
        - alpha
        - beta
        - stable
        - master
    environment:
      HOME: /Users/arya
      CARGO_HOME: /Users/arya/.cargo
      RUSTUP_HOME: /Users/arya/.rustup
      PATH: /Users/arya/opt/bin:/Users/arya/.cargo/bin:/Users/arya/.bun/bin:/usr/bin:/bin:/usr/sbin:/sbin
    commands:
      - set -euo pipefail
      - bun install --frozen-lockfile
      - make validate

  # ----- Autotag: Production (stable -> vX.Y.Z) -----
  - name: autotag-prod-checkout
    image: bash
    when:
      event:
        - push
      branch:
        - stable
    environment:
      GITHUB_TOKEN:
        from_secret: GITHUB_TOKEN
    commands:
      - set -euo pipefail
      - rm -rf .git
      - git init
      - |
        clone_url="${CI_REPO_CLONE_URL:-https://github.com/${CI_REPO}.git}"
        git remote add origin "$clone_url"
        if [ -n "${GITHUB_TOKEN:-}" ]; then
          # Avoid embedding tokens in the remote URL.
          git config url."https://x-access-token:${GITHUB_TOKEN}@github.com/".insteadOf "https://github.com/"
        fi
      - git fetch origin "+refs/heads/*:refs/remotes/origin/*" "+refs/tags/*:refs/tags/*"
      - git checkout -B stable "origin/stable"

  - name: autotag-prod-bump-tag
    image: bash
    when:
      event:
        - push
      branch:
        - stable
    environment:
      GITHUB_TOKEN:
        from_secret: GITHUB_TOKEN
    commands:
      - set -euo pipefail
      - msg="$(git log -1 --pretty=%B)"
      - |
        if echo "$msg" | grep -q "\\[CI SKIP\\]"; then
          echo "Skipping (already CI-generated commit)."
          exit 0
        fi
      - |
        if echo "$msg" | grep -q "^chore(release): bump version to "; then
          echo "Skipping (already a release bump commit)."
          exit 0
        fi
      - |
        cargo_ver="$(
          awk -F'\"' '
            /^\\[workspace\\.package\\]/ { in_section=1; next }
            in_section && /^[[:space:]]*version[[:space:]]*=/ { print $2; exit }
            in_section && /^\\[/ { in_section=0 }
          ' Cargo.toml
        )"
        if [ -z "$cargo_ver" ]; then
          echo "Failed to read workspace.package.version from Cargo.toml" >&2
          exit 1
        fi

        latest_prod_tag="$(git tag -l 'v[0-9]*.[0-9]*.[0-9]*' --sort=-v:refname | grep -v -- '-' | head -n1 || true)"
        latest_prod_ver="${latest_prod_tag#v}"
        if [ -z "$latest_prod_tag" ]; then
          latest_prod_ver="0.0.0"
        fi

        python3 - "$cargo_ver" "$latest_prod_ver" <<'PY'
        import sys
        def parse(v: str):
          parts = v.split(".")
          if len(parts) != 3:
            raise SystemExit(f"invalid semver: {v}")
          return tuple(int(x) for x in parts)
        c = parse(sys.argv[1])
        p = parse(sys.argv[2])
        sys.exit(0 if c > p else 1)
        PY
        ahead="$?"

        if [ "$ahead" -eq 0 ] && ! git show-ref --tags --quiet "refs/tags/v${cargo_ver}"; then
          tag="v${cargo_ver}"
          echo "Tagging existing version for production: ${tag}"
          git tag -a "$tag" -m "Release $tag"
        else
          IFS=. read -r major minor patch <<<"$cargo_ver"
          next="${major}.${minor}.$((patch+1))"
          tag="v${next}"
          echo "Bumping $cargo_ver -> $next ($tag)"
          python3 - "$next" <<'PY'
          import sys
          from pathlib import Path
          new_version = sys.argv[1]
          p = Path("Cargo.toml")
          lines = p.read_text().splitlines(True)
          out = []
          in_ws = False
          updated = False
          for line in lines:
              if line.strip() == "[workspace.package]":
                  in_ws = True
                  out.append(line)
                  continue
              if in_ws and line.startswith("[") and not line.strip().startswith("[workspace.package]"):
                  in_ws = False
              if in_ws and line.lstrip().startswith("version") and "=" in line and not updated:
                  prefix = line.split("=", 1)[0]
                  out.append(f'{prefix}= "{new_version}"\n')
                  updated = True
                  continue
              out.append(line)
          if not updated:
              raise SystemExit("Failed to update workspace.package.version in Cargo.toml")
          p.write_text("".join(out))
          PY
          git add Cargo.toml
          git -c user.name="oore.build CI" -c user.email="ci@oore.build" commit -m "chore(release): bump version to ${next} [CI SKIP]"
          git tag -a "$tag" -m "Release $tag"
        fi

        branch="$(git rev-parse --abbrev-ref HEAD)"
        # Push branch commit (if any), then tag.
        git push origin "$branch" || true
        git push origin "$tag"

  # ----- Autotag: Alpha (alpha -> vX.Y.Z-alpha.N) -----
  - name: autotag-alpha-checkout
    image: bash
    when:
      event:
        - push
      branch:
        - alpha
    environment:
      GITHUB_TOKEN:
        from_secret: GITHUB_TOKEN
    commands:
      - set -euo pipefail
      - rm -rf .git
      - git init
      - |
        clone_url="${CI_REPO_CLONE_URL:-https://github.com/${CI_REPO}.git}"
        git remote add origin "$clone_url"
        if [ -n "${GITHUB_TOKEN:-}" ]; then
          git config url."https://x-access-token:${GITHUB_TOKEN}@github.com/".insteadOf "https://github.com/"
        fi
      - git fetch origin "+refs/heads/*:refs/remotes/origin/*" "+refs/tags/*:refs/tags/*"
      - git checkout -B alpha "origin/alpha"

  - name: autotag-alpha-tag
    image: bash
    when:
      event:
        - push
      branch:
        - alpha
    environment:
      GITHUB_TOKEN:
        from_secret: GITHUB_TOKEN
    commands:
      - set -euo pipefail
      - msg="$(git log -1 --pretty=%B)"
      - |
        if echo "$msg" | grep -q "\\[CI SKIP\\]"; then
          echo "Skipping (already CI-generated commit)."
          exit 0
        fi
      - |
        cargo_ver="$(
          awk -F'\"' '
            /^\\[workspace\\.package\\]/ { in_section=1; next }
            in_section && /^[[:space:]]*version[[:space:]]*=/ { print $2; exit }
            in_section && /^\\[/ { in_section=0 }
          ' Cargo.toml
        )"
        if [ -z "$cargo_ver" ]; then
          echo "Failed to read workspace.package.version from Cargo.toml" >&2
          exit 1
        fi

        latest_prod_tag="$(git tag -l 'v[0-9]*.[0-9]*.[0-9]*' --sort=-v:refname | grep -v -- '-' | head -n1 || true)"
        latest_prod_ver="${latest_prod_tag#v}"
        if [ -z "$latest_prod_tag" ]; then
          latest_prod_ver="0.0.0"
        fi

        base="$(python3 - "$cargo_ver" "$latest_prod_ver" <<'PY'\nimport sys\n\ndef parse(v: str):\n  parts=v.split('.')\n  if len(parts)!=3:\n    raise SystemExit(f'invalid semver: {v}')\n  return tuple(int(x) for x in parts)\n\ndef bump_patch(v: str):\n  a,b,c=parse(v)\n  return f\"{a}.{b}.{c+1}\"\n\ncargo=sys.argv[1]\nprod=sys.argv[2]\nif parse(cargo) > parse(prod):\n  print(cargo)\nelse:\n  print(bump_patch(prod))\nPY\n)"

        prev="$(git tag -l \"v${base}-alpha.*\" --sort=-v:refname | head -n1 || true)"
        if [ -n "$prev" ]; then
          n="${prev##*.}"
          next_n="$((n+1))"
        else
          next_n="1"
        fi
        tag="v${base}-alpha.${next_n}"
        echo "Alpha tag: ${tag}"

        if [ "$cargo_ver" != "$base" ]; then
          python3 - "$base" <<'PY'\nimport sys\nfrom pathlib import Path\nnew_version=sys.argv[1]\np=Path('Cargo.toml')\nlines=p.read_text().splitlines(True)\nout=[]\nin_ws=False\nupdated=False\nfor line in lines:\n  if line.strip() == '[workspace.package]':\n    in_ws=True\n    out.append(line)\n    continue\n  if in_ws and line.startswith('[') and not line.strip().startswith('[workspace.package]'):\n    in_ws=False\n  if in_ws and line.lstrip().startswith('version') and '=' in line and not updated:\n    prefix=line.split('=',1)[0]\n    out.append(f\"{prefix}= \\\"{new_version}\\\"\\n\")\n    updated=True\n    continue\n  out.append(line)\nif not updated:\n  raise SystemExit('Failed to update workspace.package.version in Cargo.toml')\np.write_text(''.join(out))\nPY\n"
          git add Cargo.toml
          git -c user.name="oore.build CI" -c user.email="ci@oore.build" commit -m "chore(release): set prerelease base version to ${base} [CI SKIP]"
        fi

        git tag -a "$tag" -m "Alpha $tag"
        branch="$(git rev-parse --abbrev-ref HEAD)"
        git push origin "$branch"
        git push origin "$tag"

  # ----- Autotag: Beta (beta -> vX.Y.Z-beta.N) -----
  - name: autotag-beta-checkout
    image: bash
    when:
      event:
        - push
      branch:
        - beta
    environment:
      GITHUB_TOKEN:
        from_secret: GITHUB_TOKEN
