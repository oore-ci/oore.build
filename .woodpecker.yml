# Woodpecker CI
#
# IMPORTANT:
# Use a global `when.evaluate` to avoid creating no-op ("clone-only") pipelines on
# pushes to feature branches. Woodpecker otherwise triggers on every push event.

when:
  evaluate: |
    CI_PIPELINE_EVENT == "pull_request" ||
    CI_PIPELINE_EVENT == "tag" ||
    (CI_PIPELINE_EVENT == "push" && (
      CI_COMMIT_BRANCH == "master" ||
      CI_COMMIT_BRANCH == "stable" ||
      CI_COMMIT_BRANCH == "alpha" ||
      CI_COMMIT_BRANCH == "beta"
    ))

steps:
  - name: validate
    image: bash
    when:
      event:
        - pull_request
        - push
      evaluate: |
        CI_PIPELINE_EVENT == "pull_request" ||
        (CI_PIPELINE_EVENT == "push" && (
          CI_COMMIT_BRANCH == "master" ||
          CI_COMMIT_BRANCH == "stable" ||
          CI_COMMIT_BRANCH == "alpha" ||
          CI_COMMIT_BRANCH == "beta"
        ))
    environment:
      HOME: /Users/arya
      CARGO_HOME: /Users/arya/.cargo
      RUSTUP_HOME: /Users/arya/.rustup
      PATH: /Users/arya/opt/bin:/Users/arya/.cargo/bin:/Users/arya/.bun/bin:/opt/homebrew/bin:/usr/local/bin:/usr/bin:/bin:/usr/sbin:/sbin
    commands:
      - set -euo pipefail
      - ulimit -n 8192
      - bun install --frozen-lockfile
      - make validate-ci

  # ----- Autotag: Production (stable -> vX.Y.Z) -----
  - name: autotag-prod
    image: bash
    depends_on:
      - validate
    when:
      event:
        - push
      branch:
        - stable
    environment:
      GITHUB_TOKEN:
        from_secret: GITHUB_TOKEN
    commands:
      - set -euo pipefail
      - AUTOTAG_CHANNEL=stable AUTOTAG_BRANCH=stable bash tools/autotag.sh

  # ----- Autotag: Alpha (alpha -> vX.Y.Z-alpha.N) -----
  - name: autotag-alpha
    image: bash
    depends_on:
      - validate
    when:
      event:
        - push
      branch:
        - alpha
    environment:
      GITHUB_TOKEN:
        from_secret: GITHUB_TOKEN
    commands:
      - set -euo pipefail
      - AUTOTAG_CHANNEL=alpha AUTOTAG_BRANCH=alpha bash tools/autotag.sh

  # ----- Autotag: Beta (beta -> vX.Y.Z-beta.N) -----
  - name: autotag-beta
    image: bash
    depends_on:
      - validate
    when:
      event:
        - push
      branch:
        - beta
    environment:
      GITHUB_TOKEN:
        from_secret: GITHUB_TOKEN
    commands:
      - set -euo pipefail
      - AUTOTAG_CHANNEL=beta AUTOTAG_BRANCH=beta bash tools/autotag.sh

  # ----- Release: Tag -> Pages Deploy + GitHub Release -----
  - name: release-checkout
    image: bash
    when:
      event:
        - tag
    environment:
      GITHUB_TOKEN:
        from_secret: GITHUB_TOKEN
    commands:
      - set -euo pipefail
      - |
        token="$(printenv GITHUB_TOKEN || true)"
        if [ -n "$token" ]; then
          # Avoid embedding tokens in the remote URL.
          git config url."https://x-access-token:$token@github.com/".insteadOf "https://github.com/"
        fi
      - git fetch --depth=200 origin "+refs/tags/*:refs/tags/*" "+refs/heads/*:refs/remotes/origin/*"
      - tag="$(printenv CI_COMMIT_TAG || true)"
      - test -n "$tag"
      - git checkout -f "$tag"

  - name: release-build-assets
    image: bash
    depends_on:
      - release-checkout
    when:
      event:
        - tag
    environment:
      HOME: /Users/arya
      CARGO_HOME: /Users/arya/.cargo
      RUSTUP_HOME: /Users/arya/.rustup
      PATH: /Users/arya/opt/bin:/Users/arya/.cargo/bin:/Users/arya/.bun/bin:/opt/homebrew/bin:/usr/local/bin:/usr/bin:/bin:/usr/sbin:/sbin
    commands:
      - set -euo pipefail
      - tag="$(printenv CI_COMMIT_TAG || true)"
      - test -n "$tag"
      - ver="$(echo "$tag" | sed 's/^v//')"
      - mkdir -p "dist/releases/$tag"
      - ulimit -n 8192
      - bun install --frozen-lockfile
      # Build once here; release-deploy-pages reuses apps/web/dist via deploy-web-only.
      - make build-web
      - rustup target add aarch64-apple-darwin x86_64-apple-darwin
      - cargo build --release -p oored -p oore --target aarch64-apple-darwin
      - cargo build --release -p oored -p oore --target x86_64-apple-darwin
      - bun build --compile --target=bun-darwin-arm64 --outfile "dist/oore-web-arm64" "apps/web/tools/oore-web.js"
      - bun build --compile --target=bun-darwin-x64 --outfile "dist/oore-web-x86_64" "apps/web/tools/oore-web.js"
      - chmod +x dist/oore-web-arm64 dist/oore-web-x86_64
      - |
        stage_arm="dist/stage-arm64"
        stage_x64="dist/stage-x86_64"
        rm -rf "$stage_arm" "$stage_x64"
        mkdir -p "$stage_arm/bin" "$stage_x64/bin"

        cp "target/aarch64-apple-darwin/release/oored" "$stage_arm/bin/oored"
        cp "target/aarch64-apple-darwin/release/oore"  "$stage_arm/bin/oore"
        cp "dist/oore-web-arm64" "$stage_arm/bin/oore-web"
        cp -R "apps/web/dist" "$stage_arm/web-dist"
        cp "LICENSE" "$stage_arm/LICENSE"
        printf '%s\n' "$ver" > "$stage_arm/VERSION"

        cp "target/x86_64-apple-darwin/release/oored" "$stage_x64/bin/oored"
        cp "target/x86_64-apple-darwin/release/oore"  "$stage_x64/bin/oore"
        cp "dist/oore-web-x86_64" "$stage_x64/bin/oore-web"
        cp -R "apps/web/dist" "$stage_x64/web-dist"
        cp "LICENSE" "$stage_x64/LICENSE"
        printf '%s\n' "$ver" > "$stage_x64/VERSION"

        out="dist/releases/$tag"
        arm_asset="$(printf 'oore_%s_darwin_arm64.tar.gz' "$ver")"
        x64_asset="$(printf 'oore_%s_darwin_x86_64.tar.gz' "$ver")"
        checksums="$(printf 'oore_%s_checksums.txt' "$ver")"
        tar -C "$stage_arm" -czf "$out/$arm_asset" .
        tar -C "$stage_x64" -czf "$out/$x64_asset" .
        (cd "$out" && shasum -a 256 "$arm_asset" "$x64_asset" > "$checksums")

  - name: release-deploy-pages
    image: bash
    depends_on:
      - release-build-assets
    when:
      event:
        - tag
    environment:
      HOME: /Users/arya
      CARGO_HOME: /Users/arya/.cargo
      RUSTUP_HOME: /Users/arya/.rustup
      PATH: /Users/arya/opt/bin:/Users/arya/.cargo/bin:/Users/arya/.bun/bin:/opt/homebrew/bin:/usr/local/bin:/usr/bin:/bin:/usr/sbin:/sbin
      CLOUDFLARE_ACCOUNT_ID: bf288a8d0e450c22157076593bc1f6be
      CLOUDFLARE_API_TOKEN:
        from_secret: CLOUDFLARE_API_TOKEN
    commands:
      - set -euo pipefail
      - node --version
      - ./node_modules/.bin/wrangler --version
      - |
        tag="$(printenv CI_COMMIT_TAG || true)"
        test -n "$tag"
        channel="prod"
        # Tag pipelines run in a detached HEAD checkout. If we don't explicitly pass
        # a branch, Wrangler may infer "HEAD", which prevents Pages from treating this
        # as a production deploy when the production branch is configured as `stable`.
        pages_branch="stable"
        if echo "$tag" | grep -q -- '-alpha\\.'; then
          channel="alpha"
          pages_branch="alpha"
        elif echo "$tag" | grep -q -- '-beta\\.'; then
          channel="beta"
          pages_branch="beta"
        fi

        export PAGES_PROJECT_SITE="oore"
        export PAGES_PROJECT_DOCS="oore-docs"
        export PAGES_PROJECT_WEB="oore-ci"
        export PAGES_PROJECT_DEMO="oore-demo"
        export PAGES_BRANCH="$pages_branch"
        export PAGES_COMMIT_HASH="$(git rev-list -n 1 "$tag")"
        export PAGES_COMMIT_MESSAGE="$tag"
        export WRANGLER="./node_modules/.bin/wrangler"

        echo "Deploy channel=$channel branch=$PAGES_BRANCH site=$PAGES_PROJECT_SITE docs=$PAGES_PROJECT_DOCS web=$PAGES_PROJECT_WEB"
      - ulimit -n 8192
      - |
        token_len="$(printenv CLOUDFLARE_API_TOKEN | tr -d '\n' | wc -c | tr -d ' ')"
        echo "CLOUDFLARE_API_TOKEN length=$token_len"
        if [ "$token_len" -lt 20 ]; then
          echo "CLOUDFLARE_API_TOKEN missing/empty for this step." >&2
          exit 1
        fi
        token_hash="$(printenv CLOUDFLARE_API_TOKEN | tr -d '\n' | shasum -a 256 | awk '{print $1}' | cut -c1-12)"
        echo "CLOUDFLARE_API_TOKEN sha256_prefix=$token_hash"
      - ./node_modules/.bin/wrangler whoami
      # Avoid rebuilding web twice; build-assets already produced apps/web/dist.
      - make build-site build-docs
      - |
        status=0

        make deploy-site-only &
        pid_site=$!

        make deploy-docs-only &
        pid_docs=$!

        make deploy-web-only &
        pid_web=$!

        wait "$pid_site" || status=$?
        wait "$pid_docs" || status=$?
        wait "$pid_web" || status=$?

        if [ "$status" -ne 0 ]; then
          echo "One or more Pages deploy commands failed." >&2
          exit "$status"
        fi
      # Demo build intentionally overwrites apps/web/dist.
      - make build-demo
      - make deploy-demo-only

  - name: release-generate-notes
    image: bash
    depends_on:
      - release-checkout
    when:
      event:
        - tag
    commands:
      - set -euo pipefail
      - |
        tag="$(printenv CI_COMMIT_TAG || true)"
        test -n "$tag"

        channel="prod"
        if echo "$tag" | grep -q -- '-alpha\\.'; then
          channel="alpha"
        elif echo "$tag" | grep -q -- '-beta\\.'; then
          channel="beta"
        fi

        # Determine previous tag in the same channel.
        prev=""
        if [ "$channel" = "alpha" ]; then
          prev="$(git tag -l 'v*-alpha.*' --sort=-v:refname | grep -v -F "$tag" | head -n1 || true)"
        elif [ "$channel" = "beta" ]; then
          prev="$(git tag -l 'v*-beta.*' --sort=-v:refname | grep -v -F "$tag" | head -n1 || true)"
        else
          prev="$(git tag -l 'v*' --sort=-v:refname | grep -v -- '-' | grep -v -F "$tag" | head -n1 || true)"
        fi

        repo="$(printenv CI_REPO || true)"
        if [ -z "$repo" ]; then
          repo="$(
            git config --get remote.origin.url \
              | sed -n 's#.*github\\.com[:/]\\([^/]*\\/[^/]*\\)\\(\\.git\\)\\{0,1\\}$#\\1#p'
          )"
        fi
        if ! echo "$repo" | grep -q '/'; then
          echo "Failed to determine GitHub repo (got: $repo)" >&2
          exit 1
        fi

        out="dist/releases/$tag/RELEASE_NOTES.md"
        mkdir -p "$(dirname "$out")"

        {
          echo "# $tag"
          echo

          if [ -n "$prev" ]; then
            echo "Changes since $prev:"
            echo
            git log --no-merges --pretty=format:'- %s (%h)' "$prev..$tag" | grep -v '^- chore(release): bump version to ' || true
            echo
            echo "**Full Changelog**: https://github.com/$repo/compare/$prev...$tag"
          else
            echo "Changes:"
            echo
            git log --no-merges --pretty=format:'- %s (%h)' "$tag" | grep -v '^- chore(release): bump version to ' || true
            echo
            echo "**Full Changelog**: https://github.com/$repo/releases/tag/$tag"
          fi
          echo
        } > "$out"

  - name: release-github
    image: bash
    depends_on:
      - release-build-assets
      - release-deploy-pages
      - release-generate-notes
    when:
      event:
        - tag
    environment:
      GITHUB_TOKEN:
        from_secret: GITHUB_TOKEN
    commands:
      - set -euo pipefail
      - export GH_TOKEN="$GITHUB_TOKEN"
      - |
        tag="$(printenv CI_COMMIT_TAG || true)"
        test -n "$tag"
        dir="dist/releases/$tag"
        notes="$dir/RELEASE_NOTES.md"

        prerelease_flag=""
        if echo "$tag" | grep -q -- '-alpha\\.'; then
          prerelease_flag="--prerelease"
        elif echo "$tag" | grep -q -- '-beta\\.'; then
          prerelease_flag="--prerelease"
        fi

        # Install gh (user-local, no brew)
        tmp="$(mktemp -d)"
        os="$(uname -s)"
        arch="$(uname -m)"
        json="$tmp/gh_release.json"

        curl -fsSL -o "$json" "https://api.github.com/repos/cli/cli/releases/latest"
        asset_url="$(
          python3 - "$json" "$os" "$arch" <<'PY'
        import json
        import sys

        path = sys.argv[1]
        os_name = sys.argv[2]
        arch = sys.argv[3]

        with open(path, "r", encoding="utf-8") as f:
            data = json.load(f)

        if os_name == "Darwin":
            os_id = "macOS"
        elif os_name == "Linux":
            os_id = "linux"
        else:
            print("", end="")
            sys.exit(0)

        if arch in ("arm64", "aarch64"):
            arch_id = "arm64"
        elif arch in ("x86_64", "amd64"):
            arch_id = "amd64"
        else:
            print("", end="")
            sys.exit(0)

        ext = ".tar.gz"
        if os_id == "macOS":
            ext = ".zip"

        want = "_" + os_id + "_" + arch_id + ext
        for a in data.get("assets", []):
            name = a.get("name") or ""
            if name.endswith(want):
                print(a.get("browser_download_url") or "", end="")
                break
        PY
        )"
        if [ -z "$asset_url" ]; then
          echo "Failed to find gh release asset for os=$os arch=$arch" >&2
          exit 1
        fi

        archive="$tmp/gh.asset"
        case "$asset_url" in
          *.zip) archive="$tmp/gh.zip" ;;
          *.tar.gz) archive="$tmp/gh.tgz" ;;
          *) echo "Unknown gh asset URL: $asset_url" >&2; exit 1 ;;
        esac
        curl -fsSL -L -o "$archive" "$asset_url"
        if echo "$archive" | grep -q '\\zip$'; then
          unzip -q "$archive" -d "$tmp"
        else
          tar -xzf "$archive" -C "$tmp"
        fi
        ghbin="$(find "$tmp" -type f -path '*/bin/gh' | head -n1)"
        "$ghbin" --version

        repo="$(printenv CI_REPO || true)"
        if [ -z "$repo" ]; then
          repo="$(
            git config --get remote.origin.url \
              | sed -n 's#.*github\\.com[:/]\\([^/]*\\/[^/]*\\)\\(\\.git\\)\\{0,1\\}$#\\1#p'
          )"
        fi
        if ! echo "$repo" | grep -q '/'; then
          echo "Failed to determine GitHub repo (got: $repo)" >&2
          exit 1
        fi

        # Create or update release (use deterministic notes file)
        if "$ghbin" release view "$tag" --repo "$repo" >/dev/null 2>&1; then
          # shellcheck disable=SC2086
          "$ghbin" release edit "$tag" --repo "$repo" --title "$tag" $prerelease_flag --notes-file "$notes"
        else
          # shellcheck disable=SC2086
          "$ghbin" release create "$tag" --repo "$repo" --title "$tag" $prerelease_flag --notes-file "$notes"
        fi

        "$ghbin" release upload "$tag" "$dir"/*.tar.gz "$dir"/*.txt "$notes" --repo "$repo" --clobber
